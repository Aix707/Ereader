name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer
        run: npm run release:win

      - name: Prepare draft release
        id: release_context
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.eventName === "workflow_dispatch"
              ? core.getInput("tag")
              : context.ref.replace("refs/tags/", "");
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100
            });
            for (const release of releases) {
              if (release.draft && release.tag_name === tag) {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: release.id
                });
              }
            }
            core.setOutput("tag", tag);

      - name: Upload draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_context.outputs.tag }}
          name: Ereader ${{ steps.release_context.outputs.tag }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            release/Ereader-*-Setup-x64.exe
